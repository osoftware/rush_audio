name: rush_synth
description: "A high-performance Flutter plugin for MIDI synthesis and playback."
version: 0.1.0
homepage: https://github.com/osoftware/rush_audio
repository: https://github.com/osoftware/rush_audio
resolution: workspace
topics: ["midi", "audio", "soundfont", "synth", "sequencer"]

environment:
  sdk: ^3.10.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  path_provider: ^2.1.5
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: pl.net.orb.rush_synth
        pluginClass: RushSynthPlugin
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
